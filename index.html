<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIGC 新题库刷题</title>
    <style>
        :root {
            --ink: #172033;
            --ink-soft: #526071;
            --paper: #fbfcf8;
            --surface: #ffffff;
            --line: #dfe6df;
            --navy: #123047;
            --teal: #0f8a7b;
            --teal-deep: #0a6e62;
            --amber: #f0b429;
            --success-bg: #e7f7ef;
            --success-border: #17a36b;
            --error-bg: #fff0ed;
            --error-border: #dc4c3f;
            --shadow: 0 18px 45px rgba(18, 48, 71, 0.12);
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                linear-gradient(135deg, rgba(15, 138, 123, 0.08), transparent 34%),
                linear-gradient(315deg, rgba(240, 180, 41, 0.10), transparent 28%),
                var(--paper);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 920px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(251, 252, 248, 0.92);
            box-shadow: var(--shadow);
            position: relative;
            border-left: 1px solid rgba(18, 48, 71, 0.08);
            border-right: 1px solid rgba(18, 48, 71, 0.08);
        }

        .header {
            background: var(--navy);
            color: white;
            padding: 1rem 1.25rem 1.1rem;
            flex-shrink: 0;
            z-index: 10;
            border-bottom: 4px solid var(--teal);
        }
        .brand-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; }
        .header h1 { font-size: 1.35rem; font-weight: 800; margin: 0; letter-spacing: 0; }
        .header-subtitle { color: rgba(255,255,255,0.72); font-size: 0.86rem; margin-top: 0.35rem; }
        .header-badge {
            flex-shrink: 0;
            padding: 0.38rem 0.68rem;
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 999px;
            color: #dff9f4;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .visual-strip {
            height: 72px;
            flex-shrink: 0;
            background:
                linear-gradient(90deg, rgba(251, 252, 248, 0.98) 0%, rgba(251, 252, 248, 0.86) 44%, rgba(251, 252, 248, 0.18) 100%),
                url("assets/study-hero.png") right center / cover no-repeat;
            border-bottom: 1px solid var(--line);
        }

        .controls-top {
            display: grid;
            grid-template-columns: minmax(180px, 0.85fr) 1.15fr;
            gap: 1rem;
            align-items: center;
            padding: 0.9rem 1.25rem;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid var(--line);
            flex-shrink: 0;
            z-index: 9;
        }
        .filter-field { display: flex; flex-direction: column; gap: 0.35rem; }
        .field-label {
            color: var(--ink-soft);
            font-size: 0.76rem;
            font-weight: 800;
        }
        select {
            width: 100%;
            padding: 0.68rem 0.8rem;
            border: 1px solid #cad6d1;
            border-radius: 8px;
            font-size: 0.95rem;
            background: #fff;
            outline: none;
            color: var(--ink);
            cursor: pointer;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        select:focus { border-color: var(--teal); box-shadow: 0 0 0 4px rgba(15, 138, 123, 0.12); }
        .progress-panel { display: flex; flex-direction: column; gap: 0.45rem; min-width: 0; }
        .progress { font-size: 0.9rem; color: var(--ink); font-weight: 800; text-align: right; }
        .progress-track { height: 8px; border-radius: 999px; background: #e8eee9; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--teal), var(--amber)); border-radius: inherit; transition: width 0.28s ease; }

        .main-content { flex: 1; overflow-y: auto; padding: 1.1rem; display: flex; flex-direction: column; }
        .main-content::-webkit-scrollbar, .q-text::-webkit-scrollbar, .options::-webkit-scrollbar, .answer-box::-webkit-scrollbar { width: 8px; }
        .main-content::-webkit-scrollbar-thumb, .q-text::-webkit-scrollbar-thumb, .options::-webkit-scrollbar-thumb, .answer-box::-webkit-scrollbar-thumb { background: #c8d5ce; border-radius: 999px; }

        .card {
            background: var(--surface);
            padding: 1.35rem;
            border-radius: var(--radius);
            border: 1px solid rgba(18, 48, 71, 0.10);
            box-shadow: 0 10px 25px rgba(18, 48, 71, 0.08);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #edf1ed;
            padding-bottom: 0.9rem;
        }
        .q-type {
            display: inline-flex;
            align-items: center;
            background: #e8f6f3;
            color: var(--teal-deep);
            padding: 0.32rem 0.7rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 800;
        }
        .q-id { margin-top: 0.42rem; font-size: 0.82rem; color: var(--ink-soft); font-weight: 700; }
        .q-count { color: var(--navy); font-size: 1.1rem; font-weight: 900; white-space: nowrap; }

        .q-text {
            font-size: 1.08rem;
            font-weight: 650;
            margin-bottom: 1.1rem;
            white-space: pre-wrap;
            color: #111827;
            line-height: 1.72;
            max-height: 38vh;
            overflow-y: auto;
            padding: 0.15rem 0.55rem 0.15rem 0;
        }
        .q-text pre {
            background: #111827;
            color: #e5edf3;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.92rem;
            border: 1px solid #263244;
        }
        .q-text code { font-family: inherit; }

        .options { display: flex; flex-direction: column; gap: 0.7rem; flex: 1; overflow-y: auto; padding: 0.05rem 0.15rem 1rem 0.05rem; }
        .option {
            position: relative;
            display: grid;
            grid-template-columns: 2.2rem 1fr;
            align-items: center;
            gap: 0.75rem;
            min-height: 3.35rem;
            padding: 0.82rem 0.95rem;
            border: 1px solid #d7e0dc;
            border-radius: 9px;
            cursor: pointer;
            background: #fff;
            font-size: 1rem;
            line-height: 1.45;
            transition: transform 0.16s, border-color 0.16s, background 0.16s, box-shadow 0.16s;
        }
        .option:hover:not(.disabled) { border-color: var(--teal); background: #f4fbf9; transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 138, 123, 0.10); }
        .option.selected { border-color: var(--teal); background: #eefaf7; box-shadow: inset 0 0 0 1px rgba(15, 138, 123, 0.25); }
        .option.correct { border-color: var(--success-border); background: var(--success-bg); }
        .option.incorrect { border-color: var(--error-border); background: var(--error-bg); }
        .option.disabled { cursor: default; opacity: 0.96; }
        .option input { position: absolute; opacity: 0; pointer-events: none; }
        .choice-mark {
            width: 2.1rem;
            height: 2.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #eef2ef;
            color: var(--navy);
            font-weight: 900;
        }
        .option.selected .choice-mark { background: var(--teal); color: #fff; }
        .option.correct .choice-mark { background: var(--success-border); color: #fff; }
        .option.incorrect .choice-mark { background: var(--error-border); color: #fff; }
        .option-copy { min-width: 0; overflow-wrap: anywhere; }

        .input-text, .input-textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #cad6d1;
            border-radius: 9px;
            font-size: 1rem;
            font-family: inherit;
            background: #fbfcfb;
            color: var(--ink);
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .input-text:focus, .input-textarea:focus { outline: none; border-color: var(--teal); background: white; box-shadow: 0 0 0 4px rgba(15, 138, 123, 0.12); }
        .input-textarea { flex: 1; min-height: 150px; resize: none; line-height: 1.65; }

        .answer-box {
            margin-top: 1.2rem;
            padding: 1.05rem 1.1rem;
            background: #f7faf8;
            border: 1px solid #dbe6df;
            border-left: 5px solid var(--teal);
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            max-height: 27vh;
            overflow-y: auto;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
        }
        .answer-box.show { display: block; animation: fadeIn 0.25s ease; }
        .answer-title { font-weight: 900; color: var(--teal-deep); margin-bottom: 0.55rem; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; }
        .answer-content { white-space: pre-wrap; color: var(--ink); line-height: 1.65; overflow-wrap: anywhere; }

        .bottom-bar {
            background: rgba(255,255,255,0.94);
            padding: 0.95rem 1.1rem;
            box-shadow: 0 -10px 30px rgba(18, 48, 71, 0.08);
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 1fr 1.15fr 1fr 0.9fr;
            gap: 0.7rem;
            z-index: 10;
            border-top: 1px solid var(--line);
        }
        .btn {
            min-width: 0;
            padding: 0.82rem 0.65rem;
            border: none;
            border-radius: 8px;
            font-size: 0.98rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.16s, box-shadow 0.16s, background 0.16s, border-color 0.16s;
            white-space: nowrap;
        }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn-outline { background: #fff; border: 1px solid #cbd6d1; color: var(--ink); }
        .btn-outline:hover:not(:disabled) { background: #f7faf8; border-color: var(--teal); }
        .btn-primary { background: var(--navy); color: white; box-shadow: 0 8px 18px rgba(18, 48, 71, 0.18); }
        .btn-primary:hover:not(:disabled) { background: #0d273b; }
        .btn-success { background: var(--teal); color: white; box-shadow: 0 8px 18px rgba(15, 138, 123, 0.18); }
        .btn-success:hover:not(:disabled) { background: var(--teal-deep); }
        .btn:disabled { opacity: 0.42; cursor: not-allowed; box-shadow: none; transform: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 700px) {
            .app-container { max-width: none; border: none; }
            .header { padding: 0.85rem 0.9rem 0.95rem; }
            .brand-row { align-items: flex-start; }
            .header h1 { font-size: 1.08rem; }
            .header-subtitle { font-size: 0.76rem; }
            .header-badge { display: none; }
            .visual-strip {
                height: 46px;
                background:
                    linear-gradient(90deg, rgba(251, 252, 248, 0.98) 0%, rgba(251, 252, 248, 0.82) 52%, rgba(251, 252, 248, 0.12) 100%),
                    url("assets/study-hero.png") right center / cover no-repeat;
            }
            .controls-top { grid-template-columns: 1fr; gap: 0.7rem; padding: 0.75rem 0.85rem; }
            .progress { text-align: left; }
            .main-content { padding: 0.7rem; }
            .card { padding: 0.9rem; border-radius: 9px; }
            .q-header { margin-bottom: 0.75rem; padding-bottom: 0.75rem; }
            .q-count { font-size: 0.95rem; }
            .q-text { font-size: 1rem; margin-bottom: 0.85rem; max-height: 34vh; }
            .option { grid-template-columns: 1.9rem 1fr; min-height: 3rem; padding: 0.72rem; font-size: 0.95rem; }
            .choice-mark { width: 1.85rem; height: 1.85rem; border-radius: 7px; }
            .bottom-bar { grid-template-columns: 1fr 1fr; padding: 0.7rem; gap: 0.55rem; }
            .btn { padding: 0.72rem 0.45rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="brand-row">
            <div>
                <h1>AIGC 新题库刷题</h1>
                <div class="header-subtitle">88 题练习工作台 · 自动判分 · 参考答案</div>
            </div>
            <div class="header-badge">本地单页版</div>
        </div>
    </header>
    <div class="visual-strip" aria-hidden="true"></div>
    
    <div class="controls-top">
        <label class="filter-field">
            <span class="field-label">题型筛选</span>
            <select id="type-filter">
                <option value="all">所有题目</option>
            </select>
        </label>
        <div class="progress-panel">
            <div class="progress" id="progress-text"></div>
            <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
    </div>
    
    <div class="main-content" id="main-content">
        <div class="card" id="q-container">
            <!-- Question will be rendered here -->
        </div>
    </div>

    <div class="bottom-bar">
        <button id="prev-btn" class="btn btn-outline">‹ 上一题</button>
        <button id="check-btn" class="btn btn-success">核对答案</button>
        <button id="next-btn" class="btn btn-primary">下一题 ›</button>
        <button id="submit-btn" class="btn btn-success">交卷</button>
    </div>
</div>

    <script>
        const allQuestions = [
  {
    "id": 1,
    "type": "单项选择题",
    "question": "以下哪种工具常用于中文文本分词任务？（ ）",
    "options": [
      "A. NLTK",
      "B. Jieba",
      "C. OpenCV",
      "D. Scikit-learn"
    ],
    "answer": "B"
  },
  {
    "id": 2,
    "type": "单项选择题",
    "question": "模型评估中，用于衡量模型在不均衡数据集中综合性能的核心指标是？（ ）",
    "options": [
      "A. 准确率",
      "B. 宏平均F1-score",
      "C. 特异度",
      "D. 召回率"
    ],
    "answer": "B"
  },
  {
    "id": 3,
    "type": "单项选择题",
    "question": "数据标注中，“难例标注”的核心目的是？（ ）",
    "options": [
      "A. 减少标注工作量",
      "B. 聚焦模型薄弱环节，提升泛化能力",
      "C. 提高标注速度",
      "D. 简化标注规则"
    ],
    "answer": "B"
  },
  {
    "id": 4,
    "type": "单项选择题",
    "question": "PaddlePaddle中，用于加载预训练模型的核心函数是？（ ）",
    "options": [
      "A. paddle.load()",
      "B. paddle.Model()",
      "C. paddle.nn.Sequential()",
      "D. paddle.optimizer.Adam()"
    ],
    "answer": "A"
  },
  {
    "id": 5,
    "type": "单项选择题",
    "question": "图像语义分割任务中，常用的评价指标是？（ ）",
    "options": [
      "A. mIOU",
      "B. 准确率",
      "C. 精确率",
      "D. F1-score"
    ],
    "answer": "A"
  },
  {
    "id": 6,
    "type": "单项选择题",
    "question": "以下哪种不属于数据脱敏的常用方法？（ ）",
    "options": [
      "A. 替换法",
      "B. 屏蔽法",
      "C. 加密法",
      "D. 数据增强"
    ],
    "answer": "D"
  },
  {
    "id": 7,
    "type": "单项选择题",
    "question": "智能训练项目中，“数据漂移”指的是？（ ）",
    "options": [
      "A. 数据存储位置变更",
      "B. 数据分布随时间发生变化，导致模型性能下降",
      "C. 数据格式不统一",
      "D. 数据丢失"
    ],
    "answer": "B"
  },
  {
    "id": 8,
    "type": "单项选择题",
    "question": "以下哪种算法常用于异常值检测？（ ）",
    "options": [
      "A. K-means",
      "B. 孤立森林（Isolation Forest）",
      "C. 逻辑回归",
      "D. 随机森林"
    ],
    "answer": "B"
  },
  {
    "id": 9,
    "type": "单项选择题",
    "question": "语音合成（TTS）的核心输出是？（ ）",
    "options": [
      "A. 文本",
      "B. 语音信号",
      "C. 词向量",
      "D. 特征矩阵"
    ],
    "answer": "B"
  },
  {
    "id": 10,
    "type": "单项选择题",
    "question": "数据标注规范中，“边界清晰”的核心要求是？（ ）",
    "options": [
      "A. 标注框不超出图像范围",
      "B. 明确标注对象的归属类别和范围",
      "C. 标注速度快",
      "D. 标注格式统一"
    ],
    "answer": "B"
  },
  {
    "id": 11,
    "type": "单项选择题",
    "question": "Scikit-learn中，用于特征选择的SelectKBest类，其核心参数是？（ ）",
    "options": [
      "A. k",
      "B. n_components",
      "C. alpha",
      "D. threshold"
    ],
    "answer": "A"
  },
  {
    "id": 12,
    "type": "单项选择题",
    "question": "模型训练中，“早停法”的触发条件通常是？（ ）",
    "options": [
      "A. 训练轮数达到上限",
      "B. 验证集损失连续多轮不再下降",
      "C. 训练集损失为0",
      "D. 模型参数收敛"
    ],
    "answer": "B"
  },
  {
    "id": 13,
    "type": "单项选择题",
    "question": "文本情感分析中，常用于表示文本情感强度的指标是？（ ）",
    "options": [
      "A. 词频",
      "B. 情感分数（Sentiment Score）",
      "C. TF-IDF值",
      "D. 词向量相似度"
    ],
    "answer": "B"
  },
  {
    "id": 14,
    "type": "单项选择题",
    "question": "以下哪种属于模型压缩中的“剪枝”技术？（ ）",
    "options": [
      "A. 去除模型中权重接近0的连接",
      "B. 将模型参数量化为低精度",
      "C. 用小模型模仿大模型的输出",
      "D. 减少输入特征维度"
    ],
    "answer": "A"
  },
  {
    "id": 15,
    "type": "单项选择题",
    "question": "点云数据配准的核心目的是？（ ）",
    "options": [
      "A. 降低点云密度",
      "B. 将不同视角的点云数据统一到同一坐标系",
      "C. 分割不同物体",
      "D. 提取点云特征"
    ],
    "answer": "B"
  },
  {
    "id": 16,
    "type": "单项选择题",
    "question": "智能客服机器人中，“多轮对话”的核心技术是？（ ）",
    "options": [
      "A. 关键词匹配",
      "B. 上下文状态管理",
      "C. 语音识别",
      "D. 文本分类"
    ],
    "answer": "B"
  },
  {
    "id": 17,
    "type": "单项选择题",
    "question": "数据清洗中，“归一化”与“标准化”的核心区别是？（ ）",
    "options": [
      "A. 归一化处理后数据范围固定，标准化是均值为0、方差为1",
      "B. 标准化处理后数据范围固定，归一化是均值为0、方差为1",
      "C. 归一化适用于线性模型，标准化适用于非线性模型",
      "D. 归一化会改变数据分布，标准化不会"
    ],
    "answer": "A"
  },
  {
    "id": 18,
    "type": "单项选择题",
    "question": "以下哪种工具常用于数据标注质量评估？（ ）",
    "options": [
      "A. LabelStudio",
      "B. Matplotlib",
      "C. NumPy",
      "D. Pandas"
    ],
    "answer": "A"
  },
  {
    "id": 19,
    "type": "单项选择题",
    "question": "半监督学习的核心特点是？（ ）",
    "options": [
      "A. 仅使用标注数据训练",
      "B. 仅使用未标注数据训练",
      "C. 结合少量标注数据和大量未标注数据训练",
      "D. 不需要训练数据"
    ],
    "answer": "C"
  },
  {
    "id": 20,
    "type": "单项选择题",
    "question": "图像标注中，“属性标注”的核心作用是？（ ）",
    "options": [
      "A. 确定目标位置",
      "B. 描述目标的具体特征（如颜色、状态）",
      "C. 分割目标区域",
      "D. 标注目标类别"
    ],

    "answer": "指导建议：\n①结合校园消费业务场景解读预测结果，如“某学生月消费频次低于5次”需结合其年级（毕业班）、校区（校外实习）分析原因，而非仅关注数值；\n②建立预测结果业务解读模板，包含“数值结果+业务含义+异常原因+优化建议”四部分，规范解读流程；\n③定期开展结果解读案例分享，将纯数值结果转化为后勤运营决策建议（如“教辅消费频次高的区域增加书店营业时间”）。"
  }
];
        let questions = [...allQuestions];
        let currentIndex = 0;
        let userAnswers = {}; 

        const qContainer = document.getElementById('q-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const checkBtn = document.getElementById('check-btn');
        const submitBtn = document.getElementById('submit-btn');
        const typeFilter = document.getElementById('type-filter');
        const progressText = document.getElementById('progress-text');
        const progressFill = document.getElementById('progress-fill');

        // Populate type filter dynamically
        const types = [...new Set(allQuestions.map(q => q.type))];
        types.forEach(t => {
            const option = document.createElement('option');
            option.value = t;
            option.textContent = t;
            typeFilter.appendChild(option);
        });

        function isObjectiveQuestion(q) {
            return q.type.includes('选择题') || q.type.includes('判断题') || (q.type.includes('填空题') && !q.type.includes('实践题'));
        }

        function normalizeChoiceAnswer(answer, isMulti) {
            const normalized = (answer || '').replace(/\s/g, '').toUpperCase();
            if (!isMulti) return normalized;
            return normalized.split('').sort().join('');
        }

        function normalizeTextAnswer(answer) {
            return (answer || '')
                .split(/[;；]/)
                .map(item => item.trim().replace(/\s+/g, '').toLowerCase())
                .filter(Boolean);
        }

        function evaluateAnswer(q, rawAnswer) {
            if (!isObjectiveQuestion(q)) return null;
            if (q.type.includes('多项')) {
                return normalizeChoiceAnswer(rawAnswer, true) === normalizeChoiceAnswer(q.answer, true);
            }
            if (q.type.includes('选择题') || q.type.includes('判断题')) {
                return normalizeChoiceAnswer(rawAnswer, false) === normalizeChoiceAnswer(q.answer, false);
            }
            const userParts = normalizeTextAnswer(rawAnswer);
            const correctParts = normalizeTextAnswer(q.answer);
            if (userParts.length !== correctParts.length) return false;
            return userParts.every((part, index) => part === correctParts[index]);
        }

        function checkCurrentQuestion(showAnswer = true) {
            if (!questions.length) return;
            const q = questions[currentIndex];
            userAnswers[q.id + '_checked'] = true;
            userAnswers[q.id + '_isCorrect'] = evaluateAnswer(q, userAnswers[q.id] || '');
            if (showAnswer) {
                renderQuestion();
                setTimeout(() => {
                    const answerBox = document.getElementById('answer-area');
                    if (answerBox) {
                        answerBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 100);
            }
        }

        function getStats() {
            const objectiveQuestions = questions.filter(isObjectiveQuestion);
            const subjectiveQuestions = questions.filter(q => !isObjectiveQuestion(q));

            let checked = 0;
            let correct = 0;
            objectiveQuestions.forEach(q => {
                if (userAnswers[q.id + '_checked']) {
                    checked++;
                    if (userAnswers[q.id + '_isCorrect'] === true) correct++;
                }
            });

            let subjectiveAnswered = 0;
            subjectiveQuestions.forEach(q => {
                const val = (userAnswers[q.id] || '').trim();
                if (val) subjectiveAnswered++;
            });

            const objectiveScore = objectiveQuestions.length > 0 ? Math.round((correct / objectiveQuestions.length) * 100) : 0;
            const subjectiveProgress = subjectiveQuestions.length > 0 ? Math.round((subjectiveAnswered / subjectiveQuestions.length) * 100) : 0;

            return {
                total: questions.length,
                objectiveTotal: objectiveQuestions.length,
                checked,
                correct,
                wrong: checked - correct,
                unanswered: objectiveQuestions.length - checked,
                subjectiveTotal: subjectiveQuestions.length,
                subjectiveAnswered,
                objectiveScore,
                subjectiveProgress,
                objectivePass: objectiveScore >= 60
            };
        }

        function renderQuestion() {
            if (questions.length === 0) {
                qContainer.innerHTML = '<div style="text-align:center; padding: 2rem; color: #6b7280;">没有符合条件的题目。</div>';
                checkBtn.style.display = 'none';
                submitBtn.style.display = 'none';
                progressText.innerText = '0 / 0';
                progressFill.style.width = '0%';
                return;
            }
            
            const q = questions[currentIndex];
            const gradingMode = isObjectiveQuestion(q) ? '自动判分' : '参考批改';
            let html = `
                <div class="q-header">
                    <div>
                        <div class="q-type">${q.type}</div>
                        <div class="q-id">第 ${q.id} 题 · ${gradingMode}</div>
                    </div>
                    <div class="q-count">${currentIndex + 1}/${questions.length}</div>
                </div>
            `;
            
            // Format code blocks
            let formattedQuestion = q.question.replace(/```python\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html += `<div class="q-text">${formattedQuestion}</div>`;
            
            const savedAnswer = userAnswers[q.id] || '';
            const isChecked = userAnswers[q.id + '_checked'] || false;
            
            if (q.type.includes('选择题')) {
                const isMulti = q.type.includes('多项');
                const inputType = isMulti ? 'checkbox' : 'radio';
                html += '<div class="options">';
                q.options.forEach(opt => {
                    const optLetter = opt.charAt(0);
                    const optText = opt.replace(/^[A-D]\.\s*/, '');
                    const isSelected = isMulti ? savedAnswer.includes(optLetter) : savedAnswer === optLetter;
                    
                    let className = 'option';
                    if (isChecked) {
                        className += ' disabled';
                        const isCorrect = q.answer.includes(optLetter);
                        if (isSelected) {
                            className += isCorrect ? ' correct' : ' incorrect';
                        } else if (isCorrect) {
                            className += ' correct';
                        }
                    } else if (isSelected) {
                        className += ' selected';
                    }
                    
                    html += `
                        <label class="${className}">
                            <input type="${inputType}" name="q_opt" value="${optLetter}" 
                                ${isSelected ? 'checked' : ''} 
                                ${isChecked ? 'disabled' : ''}>
                            <span class="choice-mark">${optLetter}</span>
                            <span class="option-copy">${optText}</span>
                        </label>
                    `;
                });
                html += '</div>';
            } else if (q.type.includes('判断题')) {
                html += '<div class="options">';
                ['√', '×'].forEach(opt => {
                    const isSelected = savedAnswer === opt;
                    let className = 'option';
                    if (isChecked) {
                        className += ' disabled';
                        const isCorrect = q.answer === opt;
                        if (isSelected) {
                            className += isCorrect ? ' correct' : ' incorrect';
                        } else if (isCorrect) {
                            className += ' correct';
                        }
                    } else if (isSelected) {
                        className += ' selected';
                    }
                    html += `
                        <label class="${className}">
                            <input type="radio" name="q_opt" value="${opt}" 
                                ${isSelected ? 'checked' : ''} 
                                ${isChecked ? 'disabled' : ''}>
                            <span class="choice-mark">${opt}</span>
                            <span class="option-copy">${opt === '√' ? '正确' : '错误'}</span>
                        </label>
                    `;
                });
                html += '</div>';
            } else if (q.type.includes('填空题') && !q.type.includes('实践题')) {
                html += `
                    <input type="text" class="input-text" id="text-answer" 
                        value="${savedAnswer}" placeholder="请输入答案，多个空请用分号隔开"
                        ${isChecked ? 'disabled' : ''}>
                `;
            } else {
                html += `
                    <textarea class="input-textarea" id="text-answer" 
                        placeholder="请输入您的解答思路..."
                        ${isChecked ? 'disabled' : ''}>${savedAnswer}</textarea>
                `;
            }
            
            html += `
                <div class="answer-box ${isChecked ? 'show' : ''}" id="answer-area">
                    <div class="answer-title">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        参考答案${isObjectiveQuestion(q) && isChecked ? (userAnswers[q.id + '_isCorrect'] ? '（判定：正确）' : '（判定：错误）') : ''}
                    </div>
                    <div class="answer-content">${q.answer}</div>
                </div>
            `;
            
            qContainer.innerHTML = html;
            
            const stats = getStats();
            const progressPercent = Math.round(((currentIndex + 1) / questions.length) * 100);
            progressText.innerText = `第 ${currentIndex + 1} / ${questions.length} 题 · 客观题 ${stats.correct}/${stats.objectiveTotal}`;
            progressFill.style.width = `${progressPercent}%`;
            
            if (!isChecked) {
                if (q.type.includes('选择题') || q.type.includes('判断题')) {
                    const inputs = document.querySelectorAll('input[name="q_opt"]');
                    inputs.forEach(input => {
                        input.addEventListener('change', () => {
                            if (q.type.includes('多项')) {
                                const checked = Array.from(document.querySelectorAll('input[name="q_opt"]:checked')).map(cb => cb.value);
                                userAnswers[q.id] = checked.join('');
                            } else {
                                userAnswers[q.id] = input.value;
                            }
                            document.querySelectorAll('.option').forEach(lbl => lbl.classList.remove('selected'));
                            document.querySelectorAll('input[name="q_opt"]:checked').forEach(cb => {
                                cb.closest('.option').classList.add('selected');
                            });
                        });
                    });
                } else {
                    const textInput = document.getElementById('text-answer');
                    if (textInput) {
                        textInput.addEventListener('input', (e) => {
                            userAnswers[q.id] = e.target.value;
                        });
                    }
                }
            }
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === questions.length - 1;
            
            if (isChecked) {
                checkBtn.style.display = 'none';
            } else {
                checkBtn.style.display = 'flex';
            }
            submitBtn.style.display = 'flex';
            
            const mainContent = document.getElementById('main-content');
            if (mainContent) mainContent.scrollTo({ top: 0, behavior: 'smooth' });
        }

        checkBtn.addEventListener('click', () => {
            checkCurrentQuestion(true);
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < questions.length - 1) {
                checkCurrentQuestion(false);
                currentIndex++;
                renderQuestion();
            }
        });

        submitBtn.addEventListener('click', () => {
            checkCurrentQuestion(false);
            const stats = getStats();
            const message = [
                '交卷完成',
                `总题数：${stats.total}`,
                `客观题：${stats.objectiveTotal}（自动判分）`,
                `客观题得分：${stats.objectiveScore} / 100（${stats.objectivePass ? '及格' : '不及格'}，60分及格）`,
                `已判题：${stats.checked}`,
                `正确：${stats.correct}`,
                `错误：${stats.wrong}`,
                `未作答：${stats.unanswered}`,
                `主观/实践题：${stats.subjectiveTotal}`,
                `主观/实践题已作答：${stats.subjectiveAnswered}`,
                `主观/实践题完成度：${stats.subjectiveProgress} / 100`,
                '说明：主观题和实践题展示参考答案，页面仅按是否作答统计完成度。'
            ].join('\n');
            alert(message);
        });

        typeFilter.addEventListener('change', (e) => {
            const type = e.target.value;
            if (type === 'all') {
                questions = [...allQuestions];
            } else {
                questions = allQuestions.filter(q => q.type === type);
            }
            currentIndex = 0;
            renderQuestion();
        });

        // Initialize
        renderQuestion();
    </script>
</body>
</html>
